<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 3</title>
</head>
<body>
    <h1>Formulario:</h1>
    <main>
        <form action="" method="post">
                <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome">
                <br>
                <br>
                <label for="email">Email</label>
                <input type="email" name="email" id="email">
                <br>
                <br>
                <label for="date">Data</label>
                <input type="date" name="date" id="date">
                <br>
                <br>
                <fieldset>
                    <legend>Sexo</legend>
                    <label for="masc">Masculino</label>
                    <input type="radio" name="sexo" id="masc" value="masc">
                    <label for="fem">Femenino</label>
                    <input type="radio" name="sexo" id="fem" value="fem">
                    <label for="outro">Outro</label>
                    <input type="radio" name="sexo" id="outro" value="outro">
                </fieldset>

                <label for="cidade"></label>
                <select name="cidade" id="cidade">Escolha Estado
                    <option value="AC">AC</option>		
                    <option value="AL">AL</option>		
                    <option value="AP">AP</option>		
                    <option value="AM">AM</option>		
                    <option value="BA">BA</option>		
                    <option value="CE">CE</option>		
                    <option value="ES">ES</option>    	
                    <option value="GO">GO</option>		
                    <option value="MA">MA</option>		
                    <option value="MT">MT</option> 		
                    <option value="MS">MS</option>    	
                    <option value="MG">MG</option>    	
                    <option value="PA">PA</option>		
                    <option value="PB">PB</option>		
                    <option value="PR">PR</option>		
                    <option value="PE">PE</option>		
                    <option value="PI">PI</option>		
                    <option value="RJ">RJ</option>    	
                    <option value="RN">RN</option>    	
                    <option value="RS">RS</option>    	
                    <option value="RO">RO</option>		
                    <option value="RR">RR</option>		
                    <option value="SC">SC</option>    	
                    <option value="SP">SP</option>    	
                    <option value="SE">SE</option>		
                    <option value="TO">TO</option>		
                </select>

                <button type="submit">I am all done</button>
            </form>
    </main>
</body>
</html>
